<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-content h1,.markdown-content h2,.markdown-content h3 { margin-top: 1.6em; margin-bottom: .65em; font-weight: 650; color: rgb(15 23 42); }
        .markdown-content h1 { font-size: 1.9rem; }
        .markdown-content h2 { font-size: 1.45rem; }
        .markdown-content h3 { font-size: 1.15rem; }
        .markdown-content p,.markdown-content li { line-height: 1.85; color: rgb(51 65 85); }
        .markdown-content a { color: rgb(3 105 161); text-decoration: underline; text-underline-offset: 4px; }
        .markdown-content pre { margin: 1rem 0; overflow: auto; border-radius: 1rem; background: rgb(15 23 42); padding: 1rem; color: white; }
        .markdown-content code { border-radius: .5rem; background: rgb(241 245 249); padding: .12rem .35rem; font-size: .9em; }
        .markdown-content pre code { background: transparent; padding: 0; }
        .markdown-content blockquote { margin: 1rem 0; border-left: 3px solid rgb(148 163 184); padding-left: 1rem; color: rgb(71 85 105); }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_18%_0%,#dff7f2,transparent_30%),linear-gradient(135deg,#f8fafc,#f3f7f5_52%,#f8fbff)] text-slate-950 antialiased">
    <main class="mx-auto w-full max-w-4xl px-5 py-8 sm:px-8 sm:py-12">
        <article class="rounded-[2rem] border border-white/70 bg-white/76 p-6 shadow-[0_24px_80px_rgba(15,23,42,0.12)] backdrop-blur-xl sm:p-10">
            <a href="/articles" class="inline-flex h-10 items-center justify-center rounded-2xl border border-slate-200 bg-white/80 px-4 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-white">返回文章</a>
            <header class="mt-8 border-b border-slate-200 pb-8">
                <h1 class="text-3xl font-semibold leading-tight sm:text-5xl">{{title}}</h1>
                <p class="mt-5 text-base leading-7 text-slate-500">{{summary}}</p>
            </header>
            <div id="markdown-source" class="hidden">{{content}}</div>
            <section id="markdown-output" class="markdown-content mt-8"></section>
        </article>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const source = document.getElementById('markdown-source').textContent;
            document.getElementById('markdown-output').innerHTML = marked.parse(source);
        });
    </script>
</body>
</html>
