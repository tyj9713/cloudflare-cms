<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_80%_0%,#e6f4ff,transparent_28%),linear-gradient(135deg,#f8fafc,#f3f8fa_55%,#f6fbf7)] text-slate-950 antialiased">
    <main class="mx-auto w-full max-w-5xl px-5 py-8 sm:px-8 sm:py-12">
        <header class="mb-8 flex flex-col gap-4 sm:mb-10 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <p class="text-sm font-medium text-cyan-700">Files</p>
                <h1 class="mt-2 text-3xl font-semibold sm:text-4xl">文件列表</h1>
                <p class="mt-3 max-w-xl text-sm leading-6 text-slate-500">下载公开文件资源。</p>
            </div>
            <a href="/upload" class="inline-flex h-11 items-center justify-center rounded-2xl bg-slate-950 px-5 text-sm font-medium text-white shadow-lg shadow-slate-900/15 transition hover:-translate-y-0.5 hover:bg-slate-800">上传文件</a>
        </header>
        <section class="grid gap-4">
            {{fileItems}}
        </section>
    </main>
</body>
</html>
