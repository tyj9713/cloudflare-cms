<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传文件</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_80%_0%,#e6f4ff,transparent_30%),linear-gradient(135deg,#f8fafc,#f3f8fa_55%,#f6fbf7)] text-slate-950 antialiased">
    <main class="mx-auto grid min-h-screen w-full max-w-2xl place-items-center px-5 py-10">
        <section class="w-full rounded-[2rem] border border-white/70 bg-white/76 p-6 shadow-[0_24px_80px_rgba(15,23,42,0.12)] backdrop-blur-xl sm:p-8">
            <div class="mb-7 flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
                <div>
                    <p class="text-sm font-medium text-cyan-700">Upload</p>
                    <h1 class="mt-2 text-3xl font-semibold">上传文件</h1>
                    <p class="mt-3 text-sm leading-6 text-slate-500">单文件最大 25 MB。上传后会生成唯一文件 ID，避免重名覆盖。</p>
                </div>
                <a href="/admin" class="inline-flex h-10 items-center justify-center rounded-2xl border border-slate-200 bg-white/80 px-4 text-sm font-medium text-slate-900 shadow-sm transition hover:bg-white">返回后台</a>
            </div>

            <form id="uploadForm" enctype="multipart/form-data" class="space-y-5">
                <label class="block">
                    <span class="mb-2 block text-sm font-medium text-slate-700">选择文件</span>
                    <input type="file" id="file" name="file" required
                        class="block w-full rounded-2xl border border-dashed border-slate-300 bg-white/70 px-4 py-5 text-sm text-slate-600 file:mr-4 file:rounded-xl file:border-0 file:bg-slate-950 file:px-4 file:py-2 file:text-sm file:font-medium file:text-white hover:border-slate-400">
                </label>
                <button type="button" onclick="uploadFile()" class="inline-flex h-12 w-full items-center justify-center rounded-2xl bg-slate-950 px-5 text-sm font-medium text-white shadow-lg shadow-slate-900/15 transition hover:-translate-y-0.5 hover:bg-slate-800">上传</button>
                <div id="progressContainer" class="hidden">
                    <div class="h-3 overflow-hidden rounded-full bg-slate-100">
                        <div id="progressBar" class="h-full w-0 rounded-full bg-cyan-600 transition-all duration-200"></div>
                    </div>
                    <p id="uploadStatus" class="mt-3 min-h-6 text-sm text-slate-500"></p>
                    <div id="uploadResult" class="hidden rounded-2xl border border-emerald-200 bg-emerald-50 p-4 text-sm text-emerald-900">
                        <div class="font-medium">上传完成</div>
                        <div class="mt-2 flex flex-col gap-2 sm:flex-row">
                            <input id="fileUrl" readonly class="h-10 min-w-0 flex-1 rounded-xl border border-emerald-200 bg-white px-3 font-mono text-xs text-slate-700">
                            <button type="button" onclick="copyUploadedUrl()" class="h-10 rounded-xl bg-emerald-700 px-4 text-sm font-medium text-white">复制链接</button>
                        </div>
                        <a id="openFileLink" href="#" target="_blank" class="mt-3 inline-flex text-sm font-medium text-emerald-800 underline underline-offset-4">打开文件</a>
                    </div>
                </div>
            </form>
        </section>
    </main>
    <script>
        function uploadFile() {
            const form = document.getElementById('uploadForm');
            const file = document.getElementById('file').files[0];
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const status = document.getElementById('uploadStatus');

            if (!file) {
                progressContainer.classList.remove('hidden');
                status.textContent = '请选择文件。';
                return;
            }
            if (file.size > 25 * 1024 * 1024) {
                progressContainer.classList.remove('hidden');
                status.textContent = '文件超过 25 MB，无法上传到 KV。';
                return;
            }

            const formData = new FormData(form);
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);
            progressContainer.classList.remove('hidden');
            status.textContent = '准备上传...';

            xhr.upload.onprogress = function(event) {
                if (event.lengthComputable) {
                    const percentComplete = Math.round((event.loaded / event.total) * 100);
                    progressBar.style.width = percentComplete + '%';
                    status.textContent = '上传中 ' + percentComplete + '%';
                }
            };

            xhr.onload = function() {
                try {
                    const result = JSON.parse(xhr.responseText || '{}');
                    if (xhr.status === 201) {
                        const url = result.url || new URL('/files?id=' + encodeURIComponent(result.id), location.origin).href;
                        document.getElementById('fileUrl').value = url;
                        document.getElementById('openFileLink').href = url;
                        document.getElementById('uploadResult').classList.remove('hidden');
                        status.textContent = '上传成功，可复制链接插入文章或页面。';
                    } else {
                        status.textContent = result.error || '文件上传失败。';
                    }
                } catch (error) {
                    status.textContent = '文件上传失败。';
                }
            };

            xhr.onerror = function() {
                status.textContent = '网络错误，文件上传失败。';
            };

            xhr.send(formData);
        }

        async function copyUploadedUrl() {
            const input = document.getElementById('fileUrl');
            await navigator.clipboard.writeText(input.value);
            document.getElementById('uploadStatus').textContent = '文件链接已复制。';
        }
    </script>
</body>
</html>
