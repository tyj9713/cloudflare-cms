<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{pageTitle}} - Netcut CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950 antialiased">
    <div class="mx-auto flex w-full max-w-7xl flex-col gap-6 px-4 py-5 sm:px-8">
        <header class="border-b border-slate-200 pb-5">
            <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
                <div>
                    <p class="text-sm font-medium text-emerald-700">Netcut CMS</p>
                    <h1 class="mt-2 text-3xl font-semibold sm:text-4xl">后台概览</h1>
                    <p class="mt-3 text-sm leading-6 text-slate-500">当前首页：<span class="font-medium text-slate-800">{{currentHome}}</span></p>
                </div>
                <nav class="grid gap-3 sm:grid-cols-3">
                    <a href="/editor" class="inline-flex h-11 items-center justify-center rounded-xl bg-slate-950 px-5 text-sm font-medium text-white shadow-sm">新建页面</a>
                    <a href="/article-editor" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">新建文章</a>
                    <a href="/upload" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">上传文件</a>
                </nav>
            </div>
        </header>

        <section class="grid gap-4 md:grid-cols-3">
            <a href="/admin/content?type=article" class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <p class="text-sm text-slate-500">文章</p>
                <p class="mt-2 text-3xl font-semibold">{{articleCount}}</p>
            </a>
            <a href="/admin/content?type=page" class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <p class="text-sm text-slate-500">页面</p>
                <p class="mt-2 text-3xl font-semibold">{{pageCount}}</p>
            </a>
            <a href="/admin/content?type=file" class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <p class="text-sm text-slate-500">文件</p>
                <p class="mt-2 text-3xl font-semibold">{{fileCount}}</p>
            </a>
        </section>

        <section class="grid gap-4 md:grid-cols-3">
            <a href="/admin/content" class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <h2 class="text-lg font-semibold">内容管理</h2>
                <p class="mt-2 text-sm leading-6 text-slate-500">搜索、筛选、批量发布、归档和删除内容。</p>
            </a>
            <a href="/admin/settings" class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <h2 class="text-lg font-semibold">站点设置</h2>
                <p class="mt-2 text-sm leading-6 text-slate-500">管理首页、导航、主题、SEO 和页面配置。</p>
            </a>
            <a href="/admin/system" class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <h2 class="text-lg font-semibold">系统状态</h2>
                <p class="mt-2 text-sm leading-6 text-slate-500">查看模板版本、同步模板和访问统计。</p>
            </a>
        </section>
    </div>
</body>
</html>
