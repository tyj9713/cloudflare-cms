<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未经授权 - Netcut CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,#e6f4ff,transparent_34%),linear-gradient(135deg,#f8fafc,#f1f5f9)] text-slate-950 antialiased">
    <main class="grid min-h-screen place-items-center px-5 py-10">
        <section class="w-full max-w-lg rounded-[2rem] border border-white/70 bg-white/75 p-8 text-center shadow-[0_24px_80px_rgba(15,23,42,0.12)] backdrop-blur-xl">
            <div class="mx-auto mb-6 flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-950 text-white">
                <span class="text-lg font-semibold">!</span>
            </div>
            <h1 class="text-2xl font-semibold">需要登录</h1>
            <p class="mx-auto mt-3 max-w-sm text-sm leading-6 text-slate-500">当前页面仅管理员可访问，请先登录后继续。</p>
            <a href="/login" class="mt-8 inline-flex h-11 items-center justify-center rounded-2xl bg-slate-950 px-6 text-sm font-medium text-white shadow-lg shadow-slate-900/15 transition hover:-translate-y-0.5 hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-300">去登录</a>
        </section>
    </main>
</body>
</html>
