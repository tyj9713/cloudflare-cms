<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_12%_0%,#dff7f2,transparent_30%),linear-gradient(135deg,#f8fafc,#f2f7f5_52%,#f8fbff)] text-slate-950 antialiased">
    <main class="mx-auto w-full max-w-5xl px-5 py-8 sm:px-8 sm:py-12">
        <header class="mb-8 flex flex-col gap-4 sm:mb-10 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <p class="text-sm font-medium text-emerald-700">Articles</p>
                <h1 class="mt-2 text-3xl font-semibold sm:text-4xl">文章列表</h1>
                <p class="mt-3 max-w-xl text-sm leading-6 text-slate-500">浏览已发布内容。</p>
            </div>
            <a href="/" class="inline-flex h-11 items-center justify-center rounded-2xl border border-slate-200 bg-white/75 px-5 text-sm font-medium text-slate-900 shadow-sm backdrop-blur transition hover:-translate-y-0.5 hover:bg-white">返回首页</a>
        </header>
        <section class="grid gap-4">
            {{articleItems}}
        </section>
    </main>
</body>
</html>
