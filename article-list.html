<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950 antialiased">
    <main class="mx-auto w-full max-w-5xl px-5 py-8 sm:px-8 sm:py-12">
        <header class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <p class="text-sm font-medium text-emerald-700">Articles</p>
                <h1 class="mt-2 text-3xl font-semibold sm:text-4xl">文章列表</h1>
                <p class="mt-3 max-w-xl text-sm leading-6 text-slate-500">浏览已发布内容。</p>
            </div>
            <a href="/" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">返回首页</a>
        </header>
        <form class="mb-5 grid gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:grid-cols-[minmax(0,1fr)_220px_auto]">
            <input type="search" name="q" value="{{searchQuery}}" placeholder="搜索标题、摘要、正文或标签" class="h-11 rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
            <select name="category" class="h-11 rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">{{categoryOptions}}</select>
            <button class="h-11 rounded-xl bg-slate-950 px-5 text-sm font-medium text-white">筛选</button>
        </form>
        <section class="grid gap-4">{{articleItems}}</section>
        {{pagination}}
    </main>
</body>
</html>
