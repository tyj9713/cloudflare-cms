<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - Netcut CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950 antialiased">
    <div class="mx-auto flex w-full max-w-7xl flex-col gap-6 px-4 py-5 sm:px-8">
        <header class="border-b border-slate-200 pb-5">
            <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
                <div>
                    <p class="text-sm font-medium text-emerald-700">Netcut CMS</p>
                    <h1 class="mt-2 text-3xl font-semibold sm:text-4xl">内容中心</h1>
                    <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-500">统一管理页面、文章和文件。当前首页：<span class="font-medium text-slate-800">{{currentHome}}</span></p>
                </div>
                <nav class="grid gap-3 sm:grid-cols-3">
                    <a href="/editor" class="inline-flex h-11 items-center justify-center rounded-xl bg-slate-950 px-5 text-sm font-medium text-white shadow-sm">新建页面</a>
                    <a href="/article-editor" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">新建文章</a>
                    <a href="/upload" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">上传文件</a>
                </nav>
            </div>
        </header>

        <section class="grid gap-6 xl:grid-cols-[minmax(0,1fr)_360px]">
            <main class="space-y-6">
                <section class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
                    <div class="flex flex-col gap-3 border-b border-slate-100 px-5 py-4 lg:flex-row lg:items-center lg:justify-between">
                        <h2 class="text-lg font-semibold">全部内容</h2>
                        <div class="grid gap-3 sm:grid-cols-[minmax(0,1fr)_160px_auto] lg:w-[640px]">
                            <input id="contentSearch" type="search" placeholder="搜索内容、类型或 ID" class="h-10 rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                            <select id="bulkAction" class="h-10 rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                                <option value="publish">批量发布</option>
                                <option value="archive">批量下线</option>
                                <option value="delete">批量删除</option>
                            </select>
                            <button type="button" onclick="bulkApply()" class="h-10 rounded-xl bg-slate-950 px-4 text-sm font-medium text-white">执行</button>
                        </div>
                    </div>
                    <form id="contentForm" class="overflow-x-auto">
                        <table class="w-full min-w-[900px] text-left text-sm">
                            <thead class="bg-slate-50 text-xs font-medium uppercase text-slate-500">
                                <tr>
                                    <th class="px-4 py-3 w-10"><input type="checkbox" onclick="toggleAll(this)" class="h-4 w-4 rounded border-slate-300"></th>
                                    <th class="px-4 py-3">类型</th>
                                    <th class="px-4 py-3">标题</th>
                                    <th class="px-4 py-3">状态</th>
                                    <th class="px-4 py-3">更新时间</th>
                                    <th class="px-4 py-3">链接</th>
                                    <th class="px-4 py-3 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody>{{contentRows}}</tbody>
                        </table>
                    </form>
                    <p id="contentStatus" class="min-h-6 px-5 py-3 text-sm text-slate-500"></p>
                </section>
            </main>

            <aside class="h-fit rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <div>
                    <h2 class="text-lg font-semibold">版本更新</h2>
                    <div class="mt-5 grid gap-3 rounded-xl border border-slate-200 bg-slate-50 p-4">
                        <div class="flex items-center justify-between gap-4 text-sm"><span class="text-slate-500">当前版本</span><span id="localVersion" class="font-medium text-slate-900">{{localVersion}}</span></div>
                        <div class="flex items-center justify-between gap-4 text-sm"><span class="text-slate-500">远程版本</span><span id="remoteVersion" class="font-medium text-slate-900">{{remoteVersion}}</span></div>
                        <div class="flex items-center justify-between gap-4 text-sm"><span class="text-slate-500">状态</span><span id="versionStatus" class="font-medium text-slate-900">{{versionStatus}}</span></div>
                    </div>
                    <div id="updateNotice" class="mt-4">{{updateNotice}}</div>
                    <button type="button" onclick="updateTemplates()" class="mt-4 inline-flex h-11 w-full items-center justify-center rounded-xl bg-slate-950 px-5 text-sm font-medium text-white shadow-sm">{{updateButtonLabel}}</button>
                    <button type="button" onclick="refreshTemplates()" class="mt-3 inline-flex h-11 w-full items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">手动重新拉取模板</button>
                    <p id="updateStatus" class="mt-3 min-h-6 text-sm text-slate-500"></p>
                </div>

                <div class="mt-8 border-t border-slate-200 pt-6">
                    <h2 class="text-lg font-semibold">首页设置</h2>
                    <form id="setHomeForm" class="mt-5 space-y-4">
                        <select id="homeId" name="homeId" class="h-11 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm outline-none focus:border-slate-400">{{homeOptions}}</select>
                        <button type="button" onclick="setHomepage()" class="inline-flex h-11 w-full items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">保存首页</button>
                        <p id="homeStatus" class="min-h-6 text-sm text-slate-500"></p>
                    </form>
                </div>
            </aside>
        </section>

        <section class="grid gap-6 xl:grid-cols-[minmax(0,1fr)_420px]">
            <form id="siteSettingsForm" class="space-y-6 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <div>
                    <h2 class="text-lg font-semibold">站点设置</h2>
                    <p class="mt-2 text-sm leading-6 text-slate-500">管理站点名称、品牌资源、SEO 默认信息、页脚、主题、导航、首页模块和 404 页面。</p>
                </div>
                <div class="grid gap-4 md:grid-cols-2">
                    <label class="grid gap-2 text-sm font-medium text-slate-700">站点名称<input name="siteName" value="{{siteName}}" class="h-11 rounded-xl border border-slate-200 px-3 font-normal outline-none focus:border-slate-400"></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">主题模板<select name="theme" class="h-11 rounded-xl border border-slate-200 px-3 font-normal outline-none focus:border-slate-400"><option value="default" {{themeDefaultSelected}}>默认</option><option value="minimal" {{themeMinimalSelected}}>极简</option><option value="dark" {{themeDarkSelected}}>深色</option></select></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">Logo URL<input name="logoUrl" value="{{logoUrl}}" class="h-11 rounded-xl border border-slate-200 px-3 font-normal outline-none focus:border-slate-400"></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">favicon URL<input name="faviconUrl" value="{{faviconUrl}}" class="h-11 rounded-xl border border-slate-200 px-3 font-normal outline-none focus:border-slate-400"></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">SEO 标题<input name="seoTitle" value="{{seoTitle}}" class="h-11 rounded-xl border border-slate-200 px-3 font-normal outline-none focus:border-slate-400"></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">SEO 关键词<input name="seoKeywords" value="{{seoKeywords}}" class="h-11 rounded-xl border border-slate-200 px-3 font-normal outline-none focus:border-slate-400"></label>
                    <label class="md:col-span-2 grid gap-2 text-sm font-medium text-slate-700">SEO 描述<textarea name="seoDescription" rows="3" class="rounded-xl border border-slate-200 p-3 font-normal outline-none focus:border-slate-400">{{seoDescription}}</textarea></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">页脚信息<input name="footerText" value="{{footerText}}" class="h-11 rounded-xl border border-slate-200 px-3 font-normal outline-none focus:border-slate-400"></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">备案信息<input name="icpText" value="{{icpText}}" class="h-11 rounded-xl border border-slate-200 px-3 font-normal outline-none focus:border-slate-400"></label>
                </div>
                <div class="grid gap-4 md:grid-cols-2">
                    <label class="grid gap-2 text-sm font-medium text-slate-700">导航菜单<span class="text-xs font-normal text-slate-400">每行：名称|链接</span><textarea name="navigationText" rows="7" class="rounded-xl border border-slate-200 p-3 font-mono text-sm font-normal outline-none focus:border-slate-400">{{navigationText}}</textarea></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">首页模块<span class="text-xs font-normal text-slate-400">每行：类型|标题|目标，类型支持 hero/articles/pages/files/html</span><textarea name="homeModulesText" rows="7" class="rounded-xl border border-slate-200 p-3 font-mono text-sm font-normal outline-none focus:border-slate-400">{{homeModulesText}}</textarea></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">robots.txt<textarea name="robotsTxt" rows="5" class="rounded-xl border border-slate-200 p-3 font-mono text-sm font-normal outline-none focus:border-slate-400">{{robotsTxt}}</textarea></label>
                    <label class="grid gap-2 text-sm font-medium text-slate-700">自定义 404 HTML<textarea name="custom404Html" rows="5" class="rounded-xl border border-slate-200 p-3 font-mono text-sm font-normal outline-none focus:border-slate-400">{{custom404Html}}</textarea></label>
                </div>
                <label class="inline-flex items-center gap-2 text-sm text-slate-700"><input type="checkbox" name="analyticsEnabled" value="true" {{analyticsEnabledChecked}} class="h-4 w-4 rounded border-slate-300">启用页面访问统计</label>
                <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                    <button type="button" onclick="saveSiteSettings()" class="inline-flex h-11 items-center justify-center rounded-xl bg-slate-950 px-5 text-sm font-medium text-white shadow-sm">保存站点设置</button>
                    <p id="siteSettingsStatus" class="min-h-6 text-sm text-slate-500"></p>
                </div>
            </form>

            <section class="h-fit overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
                <div class="border-b border-slate-100 px-5 py-4">
                    <h2 class="text-lg font-semibold">页面访问统计</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[420px] text-left text-sm">
                        <thead class="bg-slate-50 text-xs font-medium uppercase text-slate-500"><tr><th class="px-4 py-3">路径</th><th class="px-4 py-3">访问量</th><th class="px-4 py-3">最近访问</th></tr></thead>
                        <tbody>{{statsRows}}</tbody>
                    </table>
                </div>
            </section>
        </section>
    </div>

    <script>
        const contentSearch = document.getElementById('contentSearch');
        contentSearch.addEventListener('input', () => {
            const q = contentSearch.value.trim().toLowerCase();
            document.querySelectorAll('.content-row').forEach(row => {
                row.style.display = row.dataset.search.includes(q) ? '' : 'none';
            });
        });

        function toggleAll(source) {
            document.querySelectorAll('#contentForm input[name="ids"]').forEach(input => input.checked = source.checked);
        }

        async function bulkApply() {
            const status = document.getElementById('contentStatus');
            const form = new FormData(document.getElementById('contentForm'));
            form.append('bulkAction', document.getElementById('bulkAction').value);
            if (!form.getAll('ids').length) {
                status.textContent = '请选择内容。';
                return;
            }
            if (form.get('bulkAction') === 'delete' && !confirm('确定要批量删除选中内容吗？')) return;
            status.textContent = '正在执行...';
            const response = await fetch('/admin?action=bulk', { method: 'POST', body: form, credentials: 'include' });
            const data = await response.json();
            if (!response.ok) {
                status.textContent = data.error || '操作失败。';
                return;
            }
            status.textContent = '操作完成。';
            setTimeout(() => location.reload(), 500);
        }

        async function copyLink(url) {
            const absolute = new URL(url, location.origin).href;
            await navigator.clipboard.writeText(absolute);
            document.getElementById('contentStatus').textContent = '链接已复制。';
        }

        async function remove(id) {
            if (!confirm('确定要删除吗？')) return;
            const response = await fetch('/admin?id=' + encodeURIComponent(id), { method: 'DELETE', credentials: 'include' });
            if (response.ok) location.reload();
        }

        async function setHomepage() {
            const status = document.getElementById('homeStatus');
            status.textContent = '正在保存...';
            const response = await fetch('/admin', { method: 'PATCH', body: new FormData(document.getElementById('setHomeForm')), credentials: 'include' });
            status.textContent = response.ok ? '首页设置成功。' : '首页设置失败。';
        }

        async function saveSiteSettings() {
            const status = document.getElementById('siteSettingsStatus');
            status.textContent = '正在保存...';
            const response = await fetch('/admin?action=site-settings', { method: 'POST', body: new FormData(document.getElementById('siteSettingsForm')), credentials: 'include' });
            const data = await response.json().catch(() => ({}));
            status.textContent = response.ok ? '站点设置已保存。' : (data.error || '保存失败。');
        }

        async function updateTemplates() {
            await syncTemplates('/admin?action=update-templates', '更新完成。');
        }

        async function refreshTemplates() {
            await syncTemplates('/admin?action=refresh-templates', '重新拉取完成。');
        }

        async function syncTemplates(url, successText) {
            const status = document.getElementById('updateStatus');
            status.textContent = '正在同步模板...';
            const response = await fetch(url, { method: 'POST', credentials: 'include' });
            const data = await response.json();
            if (!response.ok) {
                status.textContent = data.error || '同步失败。';
                return;
            }
            document.getElementById('localVersion').textContent = data.localVersion;
            document.getElementById('remoteVersion').textContent = data.remoteVersion;
            document.getElementById('versionStatus').textContent = data.statusLabel;
            status.textContent = successText;
            setTimeout(() => location.reload(), 800);
        }
    </script>
</body>
</html>
