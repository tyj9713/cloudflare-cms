<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{modeTitle}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <style>
        .markdown-preview h1,.markdown-preview h2,.markdown-preview h3 { margin-top: 1.25em; margin-bottom: .6em; font-weight: 650; color: rgb(15 23 42); }
        .markdown-preview p,.markdown-preview li { line-height: 1.8; color: rgb(51 65 85); }
        .markdown-preview pre { overflow: auto; border-radius: 1rem; background: rgb(15 23 42); padding: 1rem; color: white; }
        .markdown-preview code { border-radius: .5rem; background: rgb(241 245 249); padding: .12rem .35rem; }
        .markdown-preview pre code { background: transparent; padding: 0; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950 antialiased">
    <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-8">
        <header class="mb-6 flex flex-col gap-4 border-b border-slate-200 pb-5 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <p class="text-sm font-medium text-emerald-700">Article</p>
                <h1 class="mt-1 text-2xl font-semibold sm:text-3xl">{{modeTitle}}</h1>
            </div>
            <div class="flex flex-col gap-3 sm:flex-row">
                <a href="/admin" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">返回后台</a>
                <a id="previewLink" href="#" target="_blank" class="hidden h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">打开预览</a>
                <button id="saveButton" type="button" onclick="saveArticle(false)" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-200 bg-white px-5 text-sm font-medium text-slate-900 shadow-sm">保存</button>
                <button id="savePreviewButton" type="button" onclick="saveArticle(true)" class="inline-flex h-11 items-center justify-center rounded-xl bg-slate-950 px-5 text-sm font-medium text-white shadow-sm">保存并预览</button>
            </div>
        </header>

        <form id="articleForm" class="grid gap-5 xl:grid-cols-[minmax(0,1fr)_420px]">
            <input type="hidden" id="id" name="id" value="{{id}}">
            <section class="grid gap-5">
                <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                    <div class="grid gap-4 md:grid-cols-2">
                        <label class="block md:col-span-2">
                            <span class="mb-2 block text-sm font-medium text-slate-700">标题</span>
                            <input type="text" id="title" name="title" value="{{title}}" required class="h-11 w-full rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                        </label>
                        <label class="block">
                            <span class="mb-2 block text-sm font-medium text-slate-700">slug</span>
                            <input type="text" id="slug" name="slug" value="{{slug}}" class="h-11 w-full rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                            <span id="slugHint" class="mt-1 block text-xs text-slate-400">留空时会根据标题自动生成。</span>
                        </label>
                        <label class="block">
                            <span class="mb-2 block text-sm font-medium text-slate-700">状态</span>
                            <select id="statusSelect" name="status" class="h-11 w-full rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                                <option value="draft" {{statusDraftSelected}}>草稿</option>
                                <option value="published" {{statusPublishedSelected}}>发布</option>
                                <option value="archived" {{statusArchivedSelected}}>下线</option>
                            </select>
                        </label>
                        <label class="block">
                            <span class="mb-2 block text-sm font-medium text-slate-700">作者</span>
                            <input type="text" name="author" value="{{author}}" class="h-11 w-full rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                        </label>
                        <label class="block">
                            <span class="mb-2 block text-sm font-medium text-slate-700">分类</span>
                            <input type="text" name="category" value="{{category}}" class="h-11 w-full rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                        </label>
                        <label class="block md:col-span-2">
                            <span class="mb-2 block text-sm font-medium text-slate-700">标签</span>
                            <input type="text" name="tags" value="{{tags}}" placeholder="多个标签用逗号分隔" class="h-11 w-full rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                        </label>
                        <label class="block md:col-span-2">
                            <span class="mb-2 block text-sm font-medium text-slate-700">封面图 URL</span>
                            <input type="url" name="coverImage" value="{{coverImage}}" class="h-11 w-full rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                        </label>
                    </div>
                    <label class="mt-4 block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">摘要</span>
                        <textarea id="summary" name="summary" rows="3" class="w-full resize-y rounded-xl border border-slate-200 px-3 py-2 text-sm leading-6 outline-none focus:border-slate-400">{{summary}}</textarea>
                    </label>
                </div>

                <div class="grid gap-5 lg:grid-cols-2">
                    <label class="block rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                        <span class="mb-2 block text-sm font-medium text-slate-700">正文 Markdown</span>
                        <textarea id="content" name="content" rows="22" required class="w-full resize-y rounded-xl border border-slate-200 px-3 py-2 font-mono text-sm leading-6 outline-none focus:border-slate-400">{{content}}</textarea>
                    </label>
                    <section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                        <div class="mb-2 text-sm font-medium text-slate-700">实时预览</div>
                        <div id="preview" class="markdown-preview min-h-[34rem] overflow-auto rounded-xl border border-slate-100 bg-slate-50 px-4 py-3"></div>
                    </section>
                </div>
            </section>

            <aside class="h-fit rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                <h2 class="text-base font-semibold">SEO 与发布信息</h2>
                <label class="mt-4 block">
                    <span class="mb-2 block text-sm font-medium text-slate-700">SEO 标题</span>
                    <input id="seoTitle" type="text" name="seoTitle" value="{{seoTitle}}" class="h-11 w-full rounded-xl border border-slate-200 px-3 text-sm outline-none focus:border-slate-400">
                    <span id="seoTitleCount" class="mt-1 block text-xs text-slate-400"></span>
                </label>
                <label class="mt-4 block">
                    <span class="mb-2 block text-sm font-medium text-slate-700">SEO 描述</span>
                    <textarea id="seoDescription" name="seoDescription" rows="4" class="w-full resize-y rounded-xl border border-slate-200 px-3 py-2 text-sm leading-6 outline-none focus:border-slate-400">{{seoDescription}}</textarea>
                    <span id="seoDescriptionCount" class="mt-1 block text-xs text-slate-400"></span>
                </label>
                <dl class="mt-5 space-y-3 text-sm">
                    <div><dt class="text-slate-500">创建时间</dt><dd class="mt-1 text-slate-800">{{createdAt}}</dd></div>
                    <div><dt class="text-slate-500">更新时间</dt><dd class="mt-1 text-slate-800">{{updatedAt}}</dd></div>
                    <div><dt class="text-slate-500">内容 ID</dt><dd class="mt-1 break-all font-mono text-xs text-slate-700">{{id}}</dd></div>
                </dl>
                <p id="saveStatus" class="mt-5 min-h-6 text-sm text-slate-500"></p>
            </aside>
        </form>
    </main>
    <script>
        const content = document.getElementById('content');
        const preview = document.getElementById('preview');
        const title = document.getElementById('title');
        const slug = document.getElementById('slug');
        const slugHint = document.getElementById('slugHint');
        const saveButton = document.getElementById('saveButton');
        const savePreviewButton = document.getElementById('savePreviewButton');
        const previewLink = document.getElementById('previewLink');
        const seoTitle = document.getElementById('seoTitle');
        const seoDescription = document.getElementById('seoDescription');
        const seoTitleCount = document.getElementById('seoTitleCount');
        const seoDescriptionCount = document.getElementById('seoDescriptionCount');
        let slugTouched = Boolean(slug.value);
        let previewTimer;

        function slugify(value) {
            return value.trim().toLowerCase().replace(/[\s_]+/g, '-').replace(/[^\p{L}\p{N}-]+/gu, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        }
        function updatePreview() {
            clearTimeout(previewTimer);
            previewTimer = setTimeout(() => {
                preview.innerHTML = DOMPurify.sanitize(marked.parse(content.value || ''));
            }, 120);
        }
        function updateCounts() {
            seoTitleCount.textContent = (seoTitle.value.length || 0) + ' / 60，建议 60 字以内。';
            seoDescriptionCount.textContent = (seoDescription.value.length || 0) + ' / 160，建议 160 字以内。';
        }
        function updateSlugHint() {
            slugHint.textContent = slug.value ? '当前公开路径：/articles/' + slug.value : '留空时会根据标题自动生成。';
        }
        function setSaving(isSaving) {
            saveButton.disabled = isSaving;
            savePreviewButton.disabled = isSaving;
            saveButton.classList.toggle('opacity-60', isSaving);
            savePreviewButton.classList.toggle('opacity-60', isSaving);
        }
        content.addEventListener('input', updatePreview);
        slug.addEventListener('input', () => {
            slugTouched = true;
            slug.value = slugify(slug.value);
            updateSlugHint();
        });
        title.addEventListener('input', () => {
            if (!slugTouched) {
                slug.value = slugify(title.value);
                updateSlugHint();
            }
        });
        seoTitle.addEventListener('input', updateCounts);
        seoDescription.addEventListener('input', updateCounts);
        updatePreview();
        updateCounts();
        updateSlugHint();

        async function saveArticle(openPreview) {
            const status = document.getElementById('saveStatus');
            status.textContent = '正在保存...';
            setSaving(true);
            try {
                const response = await fetch('/article-editor', { method: 'POST', body: new FormData(document.getElementById('articleForm')), credentials: 'include' });
                const data = await response.json();
                if (!response.ok) {
                    status.textContent = data.error || '保存失败。';
                    return;
                }
                document.getElementById('id').value = data.id;
                const previewUrl = '/article-view?id=' + encodeURIComponent(data.id);
                previewLink.href = previewUrl;
                previewLink.classList.remove('hidden');
                previewLink.classList.add('inline-flex');
                status.textContent = '已保存。';
                if (openPreview) window.open(previewUrl, '_blank');
            } catch (error) {
                status.textContent = '网络错误，保存失败。';
            } finally {
                setSaving(false);
            }
        }
    </script>
</body>
</html>
